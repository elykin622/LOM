<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>KhoMars Buy &amp; Sell</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #f5f2ed;
  --s1:      #ffffff;
  --s2:      #fdfbf8;
  --s3:      #f0ece5;
  --border:  #e8e2d9;
  --border2: #d8d0c4;
  --text:    #2d2a25;
  --muted:   #9a9085;
  --muted2:  #7a7268;
  --oling:   #c47c1a; --oling-d:#fef6e7; --oling-b:#f5d9a0;
  --lugit:   #2d8a60; --lugit-d:#eaf6f0; --lugit-b:#a8dbc5;
  --kape:    #7a5230; --kape-d:#f5ede4;  --kape-b:#d4b49a;
  --mais:    #d4a017; --mais-d:#fff9e6;  --mais-b:#f0d58c;
  --radius:  16px;
  --shadow:  0 4px 20px rgba(0,0,0,0.05);
}
* { box-sizing:border-box; -webkit-tap-highlight-color:transparent; font-family:'Nunito',sans-serif; margin:0; padding:0; }
body { background:var(--bg); color:var(--text); padding-bottom:100px; line-height:1.4; overflow-x:hidden; }
.hdr { padding:30px 20px; text-align:center; background:var(--s1); border-bottom:1px solid var(--border); box-shadow:var(--shadow); }
.hdr h1 { font-family:'Playfair Display',serif; font-size:28px; letter-spacing:-0.5px; margin-bottom:4px; }
.hdr p { font-size:14px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; font-weight:700; }

.main { padding:20px; max-width:500px; margin:0 auto; }
.card { background:var(--s1); border-radius:var(--radius); padding:20px; border:1px solid var(--border); box-shadow:var(--shadow); margin-bottom:20px; }
.stat-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:20px; }
.stat { background:var(--s2); padding:16px; border-radius:12px; border:1px solid var(--border); text-align:center; }
.stat-val { font-size:20px; font-weight:800; display:block; }
.stat-lbl { font-size:11px; color:var(--muted); text-transform:uppercase; font-weight:700; }
.p-oling { color:var(--oling); } .p-lugit { color:var(--lugit); } .p-kape { color:var(--kape); } .p-mais { color:var(--mais); }

.btn { display:inline-flex; align-items:center; justify-content:center; padding:14px 20px; border-radius:12px; border:none; font-weight:700; font-size:15px; cursor:pointer; transition:0.2s; width:100%; gap:8px; }
.btn-primary { background:var(--text); color:#fff; }
.btn-outline { background:transparent; border:1.5px solid var(--border2); color:var(--text); }
.btn-ghost { background:var(--s3); color:var(--muted2); font-size:13px; }
.btn:active { transform:scale(0.98); opacity:0.8; }

.grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:10px; }

/* Modal */
.modal { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(45,42,37,0.4); backdrop-filter:blur(4px); display:flex; align-items:flex-end; opacity:0; pointer-events:none; transition:0.3s; z-index:1000; }
.modal.open { opacity:1; pointer-events:auto; }
.modal-content { background:var(--s1); width:100%; border-radius:24px 24px 0 0; padding:24px; transform:translateY(100%); transition:0.3s cubic-bezier(0.2,1,0.3,1); max-height:90vh; overflow-y:auto; }
.modal.open .modal-content { transform:translateY(0); }
.modal-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
.modal-header h2 { font-family:'Playfair Display',serif; font-size:22px; }
.close { font-size:28px; color:var(--muted); }

.form-group { margin-bottom:16px; }
label { display:block; font-size:13px; font-weight:700; color:var(--muted2); margin-bottom:6px; margin-left:4px; }
input, select, textarea { width:100%; padding:14px; border-radius:12px; border:1.5px solid var(--border); background:var(--s2); font-size:16px; font-weight:500; outline:none; -webkit-appearance:none; }
input:focus { border-color:var(--text); }

.report-section { margin-top:24px; }
.report-section-title { font-size:12px; font-weight:800; color:var(--muted); text-transform:uppercase; margin-bottom:12px; border-bottom:1px solid var(--border); padding-bottom:4px; }
table { width:100%; border-collapse:collapse; font-size:13px; }
td { padding:10px 4px; border-bottom:1px solid var(--border); }
.num { text-align:right; font-weight:700; }
.sync-badge { font-size: 10px; color: #2d8a60; font-weight: bold; margin-top: 4px; }

</style>
</head>
<body onload="init()">

<div class="hdr">
  <p id="hdr-date">Loading...</p>
  <h1>LOM | Galingan App</h1>
  <p>KhoMars Buy &amp; Sell Tracker</p>
</div>

<div class="main">
  <div class="stat-grid">
    <div class="stat"><span class="stat-lbl">Cash on Hand</span><span class="stat-val" id="cash-val">₱0.00</span></div>
    <div class="stat"><span class="stat-lbl">Projected Profit</span><span class="stat-val" id="profit-val">₱0.00</span></div>
  </div>

  <div class="card">
    <div class="stat-lbl" style="margin-bottom:10px">Quick Entry</div>
    <div class="grid">
      <button class="btn btn-primary" onclick="openModal('modal-p')">📥 Buy</button>
      <button class="btn btn-primary" onclick="openModal('modal-m')">📤 Sell</button>
      <button class="btn btn-outline" onclick="openModal('modal-c')">💰 Cap</button>
      <button class="btn btn-outline" onclick="openModal('modal-e')">💸 Exp</button>
    </div>
  </div>

  <div id="report-container"></div>
  
  <button class="btn btn-ghost" style="margin-top:20px" onclick="clearData()">Reset Local History</button>
</div>

<div id="modal-p" class="modal" onclick="closeOverlay(event,'modal-p')">
  <div class="modal-content">
    <div class="modal-header"><h2>Record Purchase</h2><span class="close" onclick="closeModal('modal-p')">&times;</span></div>
    <form id="form-p">
      <div class="form-group"><label>Date</label><input type="date" id="p-date" required></div>
      <div class="form-group"><label>Product</label>
        <select id="p-prod" onchange="loadPriceMemory('p')" required>
          <option value="Oling">Oling (Charcoal)</option>
          <option value="Lugit">Lugit</option>
          <option value="Kape">Kape</option>
          <option value="Mais">Mais</option>
        </select>
      </div>
      <div class="grid">
        <div class="form-group"><label>Qty (kg/sack)</label><input type="number" id="p-qty" step="any" placeholder="0" required></div>
        <div class="form-group"><label>Price / Unit</label><input type="number" id="p-price" step="any" placeholder="0" required></div>
      </div>
      <button type="submit" class="btn btn-primary" id="btn-p">Save Purchase</button>
    </form>
  </div>
</div>

<div id="modal-m" class="modal" onclick="closeOverlay(event,'modal-m')">
  <div class="modal-content">
    <div class="modal-header"><h2>Record Sale</h2><span class="close" onclick="closeModal('modal-m')">&times;</span></div>
    <form id="form-m">
      <div class="form-group"><label>Date</label><input type="date" id="m-date" required></div>
      <div class="form-group"><label>Product</label>
        <select id="m-prod" required>
          <option value="Oling">Oling (Charcoal)</option>
          <option value="Lugit">Lugit</option>
          <option value="Kape">Kape</option>
          <option value="Mais">Mais</option>
        </select>
      </div>
      <div class="grid">
        <div class="form-group"><label>Qty Sold</label><input type="number" id="m-qty" step="any" required></div>
        <div class="form-group"><label>Selling Price</label><input type="number" id="m-price" step="any" required></div>
      </div>
      <button type="submit" class="btn btn-primary" id="btn-m">Save Sale</button>
    </form>
  </div>
</div>

<div id="modal-c" class="modal" onclick="closeOverlay(event,'modal-c')">
  <div class="modal-content">
    <div class="modal-header"><h2>Add Capital</h2><span class="close" onclick="closeModal('modal-c')">&times;</span></div>
    <form id="form-c">
      <div class="form-group"><label>Date</label><input type="date" id="c-date" required></div>
      <div class="form-group"><label>Amount</label><input type="number" id="c-amt" required></div>
      <div class="form-group"><label>Source / Notes</label><input type="text" id="c-note" placeholder="Optional"></div>
      <button type="submit" class="btn btn-primary" id="btn-c">Add Capital</button>
    </form>
  </div>
</div>

<div id="modal-e" class="modal" onclick="closeOverlay(event,'modal-e')">
  <div class="modal-content">
    <div class="modal-header"><h2>Record Expense</h2><span class="close" onclick="closeModal('modal-e')">&times;</span></div>
    <form id="form-e">
      <div class="form-group"><label>Date</label><input type="date" id="e-date" required></div>
      <div class="form-group"><label>Description</label><input type="text" id="e-desc" placeholder="Gas, Food, Labor, etc." required></div>
      <div class="form-group"><label>Amount</label><input type="number" id="e-amt" required></div>
      <button type="submit" class="btn btn-primary" id="btn-e">Save Expense</button>
    </form>
  </div>
</div>

<script>
// ══════════ CONFIG ══════════
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxOY7SnibZJKWFWRB-X9H90hPiUFU_Q3cmvRxEGk3tNOq4-8GEjMsL6IJgW49kBvFNT/exec';

let db = JSON.parse(localStorage.getItem('km4_db')) || { purchase:[], sell:[], capital:[], expense:[] };

function save() {
    localStorage.setItem('km4_db', JSON.stringify(db));
    hydrate();
}

// ══════════ GOOGLE SYNC ══════════
async function syncToGoogle(type, data, buttonId) {
    const btn = document.getElementById(buttonId);
    const originalText = btn.innerHTML;
    btn.disabled = true;
    btn.innerHTML = "Syncing Online...";

    const formData = new FormData();
    formData.append('TransactionType', type);
    for (let key in data) {
        formData.append(key, data[key]);
    }

    try {
        await fetch(SCRIPT_URL, { method: 'POST', body: formData });
        console.log("Cloud Sync Successful");
    } catch (e) {
        console.error("Cloud Sync Failed", e);
        alert("Saved locally, but could not sync to Google Sheets. Check your internet.");
    } finally {
        btn.disabled = false;
        btn.innerHTML = originalText;
    }
}

// ══════════ ACTIONS ══════════
document.getElementById('form-p').onsubmit = async (e) => {
    e.preventDefault();
    const entry = {
        Date: document.getElementById('p-date').value,
        Category: document.getElementById('p-prod').value,
        Quantity: parseFloat(document.getElementById('p-qty').value),
        Amount: parseFloat(document.getElementById('p-price').value),
        Notes: "Purchase"
    };
    db.purchase.push(entry);
    localStorage.setItem('km4_last_price_'+entry.Category, entry.Amount);
    save();
    closeModal('modal-p');
    await syncToGoogle('Purchase', entry, 'btn-p');
};

document.getElementById('form-m').onsubmit = async (e) => {
    e.preventDefault();
    const entry = {
        Date: document.getElementById('m-date').value,
        Category: document.getElementById('m-prod').value,
        Quantity: parseFloat(document.getElementById('m-qty').value),
        Amount: parseFloat(document.getElementById('m-price').value),
        Notes: "Sale"
    };
    db.sell.push(entry);
    save();
    closeModal('modal-m');
    await syncToGoogle('Sale', entry, 'btn-m');
};

document.getElementById('form-c').onsubmit = async (e) => {
    e.preventDefault();
    const entry = {
        Date: document.getElementById('c-date').value,
        Category: "Capital",
        Amount: parseFloat(document.getElementById('c-amt').value),
        Notes: document.getElementById('c-note').value || "Initial Capital"
    };
    db.capital.push(entry);
    save();
    closeModal('modal-c');
    await syncToGoogle('Capital', entry, 'btn-c');
};

document.getElementById('form-e').onsubmit = async (e) => {
    e.preventDefault();
    const entry = {
        Date: document.getElementById('e-date').value,
        Category: "Expense",
        Amount: parseFloat(document.getElementById('e-amt').value),
        Notes: document.getElementById('e-desc').value
    };
    db.expense.push(entry);
    save();
    closeModal('modal-e');
    await syncToGoogle('Expense', entry, 'btn-e');
};

// ══════════ REFRESH UI ══════════
function hydrate() {
    let totalCap = db.capital.reduce((a,b)=>a+b.Amount,0);
    let totalExp = db.expense.reduce((a,b)=>a+b.Amount,0);
    let totalBuy = db.purchase.reduce((a,b)=>a+(b.Quantity*b.Amount),0);
    let totalSell = db.sell.reduce((a,b)=>a+(b.Quantity*b.Amount),0);

    const cash = totalCap + totalSell - totalBuy - totalExp;
    document.getElementById('cash-val').textContent = '₱' + cash.toLocaleString();
    document.getElementById('profit-val').textContent = '₱' + (totalSell - totalBuy - totalExp).toLocaleString();
    
    renderReport();
}

function renderReport() {
    const fmt = n => n.toLocaleString(undefined,{minimumFractionDigits:2});
    let h = `<div class="report-section"><div class="report-section-title">Recent Transactions</div><table>`;
    
    // Show last 10 combined transactions
    let all = [
        ...db.purchase.map(x=>({...x, t:'Buy', val:x.Quantity*x.Amount})),
        ...db.sell.map(x=>({...x, t:'Sell', val:x.Quantity*x.Amount})),
        ...db.expense.map(x=>({...x, t:'Exp', val:x.Amount}))
    ].sort((a,b)=>new Date(b.Date)-new Date(a.Date)).slice(0,10);

    all.forEach(x => {
        h += `<tr><td>${x.Date}<br><small>${x.t}: ${x.Category || x.Notes}</small></td><td class="num">₱${fmt(x.val)}</td></tr>`;
    });
    h += `</table></div>`;
    document.getElementById('report-container').innerHTML = h;
}

// ══════════ UTILS ══════════
function openModal(id){ document.getElementById(id).classList.add('open'); }
function closeModal(id){ document.getElementById(id).classList.remove('open'); }
function closeOverlay(e,id){ if(e.target===document.getElementById(id))closeModal(id); }
function today(){ return new Date().toISOString().split('T')[0]; }
function loadPriceMemory(prefix){
    const prod = document.getElementById(prefix+'-prod').value;
    const last = localStorage.getItem('km4_last_price_'+prod);
    if(last) document.getElementById(prefix+'-price').value = last;
}
function clearData(){ if(confirm("Clear local records? Cloud data stays safe.")) { localStorage.removeItem('km4_db'); location.reload(); }}

function init() {
    document.getElementById('hdr-date').textContent = new Date().toLocaleDateString('en-PH',{weekday:'short',month:'short',day:'numeric',year:'numeric'});
    document.getElementById('p-date').value = today();
    document.getElementById('m-date').value = today();
    document.getElementById('c-date').value = today();
    document.getElementById('e-date').value = today();
    hydrate();
}
</script>

</body>
</html>
