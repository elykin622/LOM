<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>KhoMars Buy & Sell</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #f5f2ed;
  --s1:      #ffffff;
  --s2:      #fdfbf8;
  --s3:      #f0ece5;
  --border:  #e8e2d9;
  --border2: #d8d0c4;
  --text:    #2d2a25;
  --muted:   #9a9085;
  --muted2:  #7a7268;
  --oling:   #c47c1a; --oling-d:#fef6e7; --oling-b:#f5d9a0;
  --lugit:   #2d8a60; --lugit-d:#eaf6f0; --lugit-b:#a8dbc5;
  --kape:    #7a5230; --kape-d:#f5ede4;  --kape-b:#d4b49a;
  --mais:    #d4a017; --mais-d:#fff9e6;  --mais-b:#f0d58c;
  --radius:  16px;
  --shadow:  0 4px 20px rgba(0,0,0,0.05);
}
* { box-sizing:border-box; -webkit-tap-highlight-color:transparent; font-family:'Nunito',sans-serif; margin:0; padding:0; }
body { background:var(--bg); color:var(--text); padding-bottom:100px; line-height:1.4; overflow-x:hidden; }
.hdr { padding:30px 20px; text-align:center; background:var(--s1); border-bottom:1px solid var(--border); box-shadow:var(--shadow); }
.hdr h1 { font-family:'Playfair Display',serif; font-size:28px; letter-spacing:-0.5px; margin-bottom:4px; }
.hdr p { font-size:14px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; font-weight:700; }

.main { padding:20px; max-width:500px; margin:0 auto; }
.stat-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:20px; }
.stat { background:var(--s1); padding:16px; border-radius:12px; border:1px solid var(--border); text-align:center; box-shadow:var(--shadow); }
.stat-val { font-size:20px; font-weight:800; display:block; }
.stat-lbl { font-size:11px; color:var(--muted); text-transform:uppercase; font-weight:700; }

.card { background:var(--s1); border-radius:var(--radius); padding:20px; border:1px solid var(--border); box-shadow:var(--shadow); margin-bottom:20px; }
.grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.btn { display:inline-flex; align-items:center; justify-content:center; padding:14px; border-radius:12px; border:none; font-weight:700; font-size:14px; cursor:pointer; transition:0.2s; width:100%; gap:8px; }
.btn-primary { background:var(--text); color:#fff; }
.btn-outline { background:transparent; border:1.5px solid var(--border2); color:var(--text); }
.btn-ghost { background:var(--s3); color:var(--muted2); font-size:12px; }

/* TABS SYSTEM */
.tabs { display:flex; gap:8px; overflow-x:auto; padding:4px 0 16px; scrollbar-width:none; -ms-overflow-style:none; }
.tabs::-webkit-scrollbar { display:none; }
.tab { padding:8px 16px; border-radius:20px; background:var(--s3); color:var(--muted2); font-size:13px; font-weight:700; white-space:nowrap; border:1px solid transparent; }
.tab.active { background:var(--text); color:#fff; }

/* MODAL */
.modal { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(45,42,37,0.4); backdrop-filter:blur(4px); display:flex; align-items:flex-end; opacity:0; pointer-events:none; transition:0.3s; z-index:1000; }
.modal.open { opacity:1; pointer-events:auto; }
.modal-content { background:var(--s1); width:100%; border-radius:24px 24px 0 0; padding:24px; transform:translateY(100%); transition:0.3s cubic-bezier(0.2,1,0.3,1); max-height:90vh; overflow-y:auto; }
.modal.open .modal-content { transform:translateY(0); }
.form-group { margin-bottom:16px; }
label { display:block; font-size:12px; font-weight:800; color:var(--muted); text-transform:uppercase; margin-bottom:6px; }
input, select { width:100%; padding:14px; border-radius:12px; border:1.5px solid var(--border); background:var(--s2); font-size:16px; outline:none; }

/* TABLES */
.report-section { margin-top:20px; }
.report-title { font-size:12px; font-weight:800; color:var(--muted); text-transform:uppercase; margin-bottom:10px; padding-bottom:4px; border-bottom:1px solid var(--border); }
table { width:100%; border-collapse:collapse; font-size:13px; margin-bottom:20px; }
td { padding:10px 4px; border-bottom:1px solid var(--border); }
.num { text-align:right; font-weight:700; }
</style>
</head>
<body onload="init()">

<div class="hdr">
  <p id="hdr-date"></p>
  <h1>LOM | Galingan App</h1>
  <p>KhoMars Buy & Sell Tracker</p>
</div>

<div class="main">
  <div class="stat-grid">
    <div class="stat"><span class="stat-lbl">Cash on Hand</span><span class="stat-val" id="cash-val">₱0</span></div>
    <div class="stat"><span class="stat-lbl">Total Profit</span><span class="stat-val" id="profit-val">₱0</span></div>
  </div>

  <div class="card">
    <div class="grid">
      <button class="btn btn-primary" onclick="openModal('modal-p')">📥 Buy</button>
      <button class="btn btn-primary" onclick="openModal('modal-m')">📤 Sell</button>
      <button class="btn btn-outline" onclick="openModal('modal-c')">💰 Cap</button>
      <button class="btn btn-outline" onclick="openModal('modal-e')">💸 Exp</button>
    </div>
  </div>

  <div class="tabs" id="tab-list">
    <div class="tab active" onclick="switchTab('Oling')">Oling</div>
    <div class="tab" onclick="switchTab('Lugit')">Lugit</div>
    <div class="tab" onclick="switchTab('Kape')">Kape</div>
    <div class="tab" onclick="switchTab('Mais')">Mais</div>
    <div class="tab" onclick="switchTab('Other')">Other</div>
  </div>

  <div id="report-view"></div>

  <button class="btn btn-ghost" style="margin-top:20px; width:100%" onclick="window.print()">🖨️ Print Records</button>
</div>

<div id="modal-p" class="modal" onclick="closeOverlay(event,'modal-p')">
  <div class="modal-content">
    <h3>Record Purchase</h3><br>
    <form id="form-p">
      <div class="form-group"><label>Date</label><input type="date" id="p-date" required></div>
      <div class="form-group"><label>Product</label>
        <select id="p-prod" onchange="loadLastPrice('p')" required>
          <option value="Oling">Oling</option><option value="Lugit">Lugit</option><option value="Kape">Kape</option><option value="Mais">Mais</option>
        </select>
      </div>
      <div class="grid">
        <div class="form-group"><label>Qty</label><input type="number" id="p-qty" step="any" required></div>
        <div class="form-group"><label>Price/Unit</label><input type="number" id="p-price" step="any" required></div>
      </div>
      <button type="submit" class="btn btn-primary" id="btn-p">Save & Sync</button>
    </form>
  </div>
</div>

<div id="modal-m" class="modal" onclick="closeOverlay(event,'modal-m')">
  <div class="modal-content">
    <h3>Record Sale</h3><br>
    <form id="form-m">
      <div class="form-group"><label>Date</label><input type="date" id="m-date" required></div>
      <div class="form-group"><label>Product</label>
        <select id="m-prod" required>
          <option value="Oling">Oling</option><option value="Lugit">Lugit</option><option value="Kape">Kape</option><option value="Mais">Mais</option>
        </select>
      </div>
      <div class="grid">
        <div class="form-group"><label>Qty</label><input type="number" id="m-qty" step="any" required></div>
        <div class="form-group"><label>Price/Unit</label><input type="number" id="m-price" step="any" required></div>
      </div>
      <button type="submit" class="btn btn-primary" id="btn-m">Save & Sync</button>
    </form>
  </div>
</div>

<div id="modal-c" class="modal" onclick="closeOverlay(event,'modal-c')">
  <div class="modal-content">
    <h3>Add Capital</h3><br>
    <form id="form-c">
      <div class="form-group"><label>Date</label><input type="date" id="c-date" required></div>
      <div class="form-group"><label>Amount</label><input type="number" id="c-amt" required></div>
      <div class="form-group"><label>Note</label><input type="text" id="c-note" placeholder="Source"></div>
      <button type="submit" class="btn btn-primary" id="btn-c">Save & Sync</button>
    </form>
  </div>
</div>

<div id="modal-e" class="modal" onclick="closeOverlay(event,'modal-e')">
  <div class="modal-content">
    <h3>Record Expense</h3><br>
    <form id="form-e">
      <div class="form-group"><label>Date</label><input type="date" id="e-date" required></div>
      <div class="form-group"><label>Item</label><input type="text" id="e-desc" required></div>
      <div class="form-group"><label>Amount</label><input type="number" id="e-amt" required></div>
      <button type="submit" class="btn btn-primary" id="btn-e">Save & Sync</button>
    </form>
  </div>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxOY7SnibZJKWFWRB-X9H90hPiUFU_Q3cmvRxEGk3tNOq4-8GEjMsL6IJgW49kBvFNT/exec';
let activeTab = 'Oling';
let db = JSON.parse(localStorage.getItem('km4_db')) || { purchase:[], sell:[], capital:[], expense:[] };

function save() {
    localStorage.setItem('km4_db', JSON.stringify(db));
    hydrate();
}

async function sync(type, data, btnId) {
    const btn = document.getElementById(btnId);
    btn.disabled = true; btn.innerHTML = "Syncing...";
    const fd = new FormData();
    fd.append('TransactionType', type);
    for(let k in data) fd.append(k, data[k]);
    try { await fetch(SCRIPT_URL, { method: 'POST', body: fd }); }
    catch(e) { alert("Local save only (Offline)"); }
    finally { btn.disabled = false; btn.innerHTML = "Save & Sync"; }
}

// FORM SUBMISSIONS
document.getElementById('form-p').onsubmit = (e) => {
    e.preventDefault();
    const d = { Date:document.getElementById('p-date').value, Category:document.getElementById('p-prod').value, Quantity:parseFloat(document.getElementById('p-qty').value), Amount:parseFloat(document.getElementById('p-price').value), Notes:'Purchase' };
    db.purchase.push(d); localStorage.setItem('last_p_'+d.Category, d.Amount);
    save(); closeModal('modal-p'); sync('Purchase', d, 'btn-p');
};

document.getElementById('form-m').onsubmit = (e) => {
    e.preventDefault();
    const d = { Date:document.getElementById('m-date').value, Category:document.getElementById('m-prod').value, Quantity:parseFloat(document.getElementById('m-qty').value), Amount:parseFloat(document.getElementById('m-price').value), Notes:'Sale' };
    db.sell.push(d); save(); closeModal('modal-m'); sync('Sale', d, 'btn-m');
};

document.getElementById('form-c').onsubmit = (e) => {
    e.preventDefault();
    const d = { Date:document.getElementById('c-date').value, Category:'Capital', Amount:parseFloat(document.getElementById('c-amt').value), Notes:document.getElementById('c-note').value };
    db.capital.push(d); save(); closeModal('modal-c'); sync('Capital', d, 'btn-c');
};

document.getElementById('form-e').onsubmit = (e) => {
    e.preventDefault();
    const d = { Date:document.getElementById('e-date').value, Category:'Expense', Amount:parseFloat(document.getElementById('e-amt').value), Notes:document.getElementById('e-desc').value };
    db.expense.push(d); save(); closeModal('modal-e'); sync('Expense', d, 'btn-e');
};

function switchTab(t) {
    activeTab = t;
    document.querySelectorAll('.tab').forEach(el => el.classList.toggle('active', el.innerText === t));
    hydrate();
}

function hydrate() {
    const fmt = n => n.toLocaleString();
    let cap = db.capital.reduce((a,b)=>a+b.Amount,0);
    let exp = db.expense.reduce((a,b)=>a+b.Amount,0);
    let buy = db.purchase.reduce((a,b)=>a+(b.Quantity*b.Amount),0);
    let sell = db.sell.reduce((a,b)=>a+(b.Quantity*b.Amount),0);
    
    document.getElementById('cash-val').innerText = '₱' + fmt(cap + sell - buy - exp);
    document.getElementById('profit-val').innerText = '₱' + fmt(sell - buy - exp);

    renderActiveTab();
}

function renderActiveTab() {
    let h = `<div class="report-section"><div class="report-title">${activeTab} Inventory</div><table>`;
    if(activeTab === 'Other') {
        h += `<tr><td>Expenses</td><td class="num">₱${db.expense.reduce((a,b)=>a+b.Amount,0).toLocaleString()}</td></tr>`;
        h += `<tr><td>Capital</td><td class="num">₱${db.capital.reduce((a,b)=>a+b.Amount,0).toLocaleString()}</td></tr>`;
    } else {
        const buys = db.purchase.filter(x => x.Category === activeTab);
        const sells = db.sell.filter(x => x.Category === activeTab);
        buys.forEach(x => h += `<tr><td>${x.Date} (Buy)<br><small>${x.Quantity} units</small></td><td class="num">₱${(x.Quantity*x.Amount).toLocaleString()}</td></tr>`);
        sells.forEach(x => h += `<tr><td>${x.Date} (Sale)<br><small>${x.Quantity} units</small></td><td class="num">₱${(x.Quantity*x.Amount).toLocaleString()}</td></tr>`);
    }
    h += `</table></div>`;
    document.getElementById('report-view').innerHTML = h;
}

function openModal(id){ document.getElementById(id).classList.add('open'); }
function closeModal(id){ document.getElementById(id).classList.remove('open'); }
function closeOverlay(e,id){ if(e.target===document.getElementById(id))closeModal(id); }
function today(){ return new Date().toISOString().split('T')[0]; }
function loadLastPrice(p){
    const prod = document.getElementById(p+'-prod').value;
    const last = localStorage.getItem('last_p_'+prod);
    if(last) document.getElementById(p+'-price').value = last;
}
function init() {
    document.getElementById('hdr-date').innerText = new Date().toLocaleDateString('en-PH',{weekday:'short',month:'short',day:'numeric'});
    document.getElementById('p-date').value = today();
    document.getElementById('m-date').value = today();
    document.getElementById('c-date').value = today();
    document.getElementById('e-date').value = today();
    hydrate();
}
</script>
</body>
</html>
